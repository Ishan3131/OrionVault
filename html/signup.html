<!DOCTYPE html>
<html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Orion Vault</title>
      <link rel="stylesheet" href="../css/signup.css">
      <link rel="stylesheet" href="../css/style.css">
      <link rel="icon" href="../images/logo.svg">
    </head>

    <body>
        <div class="signup-form">
          <div class="messages">
            <h4>NEW PLAYER</h4>
            <h1>CREATE ACCOUNT</h1>
            <p>Choose your identity, Enter the Vault.</p>
          </div>

          <hr/>

          <div class="fields">
              <label for="gamertag">GAMER TAG</label>
              <input type="text" id="gamertag" class="input-field" />
              <label for="email">EMAIL ADDRESS</label>
              <input type="email" id="email" class="input-field" />
              <label for="age">AGE <span>must be 13 or older</span></label>
              <input type="number" id="age" class="input-field" />
          </div>

        <button id="signup_button">CREATE</button>
        </div>
      
    </body>
    <script src="../js/signup.js"></script>
</html>
