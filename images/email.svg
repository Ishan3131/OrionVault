<svg width="320" height="220" viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg">

  <!-- Shadow -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"></feDropShadow>
    </filter>
  </defs>

  <!-- Envelope Base -->
  <rect x="20" y="30" width="280" height="160" rx="22" fill="#f2f2f2" filter="url(#shadow)"></rect>

  <!-- Inner Grey Fold -->
  <polygon points="20,30 160,120 300,30" fill="#e6e6e6"></polygon>

  <polygon points="20,190 160,100 300,190" fill="#d9d9d9"></polygon>

  <!-- Thick Red M Frame -->
  <path d="
    M 20 30
    L 20 190
    L 60 190
    L 60 70
    L 160 145
    L 260 70
    L 260 190
    L 300 190
    L 300 30
    L 260 30
    L 160 105
    L 60 30
    Z" fill="#D44638"></path>

</svg>